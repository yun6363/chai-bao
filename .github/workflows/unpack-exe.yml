      - name: List incoming directory (debug)
        run: |
          echo "Contents of incoming:"
          ls -la incoming/ || echo "incoming directory not found!"

      - name: Run pyinstxtractor to extract EXE
        run: |
          mkdir -p output
          python pyinstxtractor.py incoming/caiji023.exe -o output/extracted
          # 打印 pyinstxtractor 的退出码
          echo "pyinstxtractor exit code: $?"
          # 查看 output 目录下生成了什么
          ls -la output/ || echo "output directory empty or missing"

      - name: Debug output/extracted
        run: |
          if [ -d "output/extracted" ]; then
            echo "output/extracted exists, contents:"
            ls -la output/extracted/
          else
            echo "output/extracted does NOT exist"
            # 如果存在 pyinstxtractor 的错误日志，打印出来
            find . -name "*.log" -o -name "*error*" | xargs cat 2>/dev/null || true
          fi
