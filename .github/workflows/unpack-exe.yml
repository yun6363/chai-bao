name: Python EXE Unpacker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install decompilers
        run: |
          pip install uncompyle6

      - name: Download pyinstxtractor
        run: |
          wget https://raw.githubusercontent.com/extremecoders-re/pyinstxtractor/master/pyinstxtractor.py
          chmod +x pyinstxtractor.py

      - name: List incoming directory
        run: |
          echo "Contents of incoming:"
          ls -la incoming/ || echo "incoming directory not found"

      - name: Extract with pyinstxtractor
        id: extract
        run: |
          python pyinstxtractor.py incoming/caiji023.exe
          if [ -d "caiji023.exe_extracted" ]; then
            echo "Extraction successful, renaming directory..."
            mkdir -p output
            mv caiji023.exe_extracted output/extracted
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "Extraction failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Fix headers and decompile
        if: steps.extract.outputs.status == 'success'
        run: |
          cd output/extracted
          mkdir -p ../source
          for pyc_file in *.pyc; do
            echo "Processing $pyc_file"
            if [ -f "struct" ]; then
              python -c "import sys; f_s=open('struct','rb'); magic=f_s.read(4); f_s.close(); f_pyc=open(sys.argv[1],'rb'); content=f_pyc.read(); f_pyc.close(); f_out=open(sys.argv[1],'wb'); f_out.write(magic+content); f_out.close()" "$pyc_file"
            fi
            uncompyle6 "$pyc_file" > "../source/${pyc_file%.pyc}.py" || echo "uncompyle6 failed for $pyc_file"
          done
          echo "Decompilation finished. Source code in ../source/"

      - name: Upload decompiled source code
        if: steps.extract.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-source-code
          path: output/source/

      - name: Upload extraction logs on failure
        if: steps.extract.outputs.status != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: extraction-failure-logs
          path: |
            pyinstxtractor.py
            caiji023.exe_extracted/
            output/
          if-no-files-found: ignore

      - name: Failure message
        if: steps.extract.outputs.status != 'success'
        run: |
          echo "❌ Extraction failed. Possible reasons:"
          echo "  - Not a PyInstaller executable"
          echo "  - File is encrypted or packed (try UPX)"
          echo "  - PyInstaller version is too new"
          exit 1
